name: Dependency Update

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Update frontend dependencies
      run: |
        cd ecommerce-platform/frontend
        npm update
        npm audit fix --audit-level=moderate

    - name: Update backend dependencies
      run: |
        cd ecommerce-platform/backend
        npm update
        npm audit fix --audit-level=moderate

    - name: Update API dependencies
      run: |
        cd ecommerce-platform/api
        npm update
        npm audit fix --audit-level=moderate

    - name: Run tests
      run: |
        cd ecommerce-platform/frontend && npm test --if-present
        cd ../backend && npm test --if-present
        cd ../api && npm test --if-present

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: '🔄 Automated Dependency Update'
        body: |
          ## 🔄 Automated Dependency Update
          
          This PR updates dependencies across all packages:
          
          - Frontend dependencies updated
          - Backend dependencies updated  
          - API dependencies updated
          
          ### 🧪 Testing
          All tests have been run and passed.
          
          ### 📋 Checklist
          - [ ] Review updated dependencies
          - [ ] Test application locally
          - [ ] Verify no breaking changes
          
          ---
          
          🤖 This PR was created automatically by the dependency update workflow.
        branch: chore/dependency-update
        delete-branch: true

# Apache Virtual Host Configuration for AfroSuperStore
# DreamHost VPS - Traditional Deployment
# Domain: www.afrosuperstore.ca

<VirtualHost *:80>
    ServerName afrosuperstore.ca
    ServerAlias www.afrosuperstore.ca
    DocumentRoot /home/afrosuperstore/afrosuperstore.ca/frontend/.next
    
    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    
    # Security headers
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Error and access logs
    ErrorLog /home/afrosuperstore/afrosuperstore.ca/logs/apache_error.log
    CustomLog /home/afrosuperstore/afrosuperstore.ca/logs/apache_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName afrosuperstore.ca
    ServerAlias www.afrosuperstore.ca
    DocumentRoot /home/afrosuperstore/afrosuperstore.ca/frontend/.next
    
    # SSL Configuration (DreamHost managed)
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/www.afrosuperstore.ca.crt
    SSLCertificateKeyFile /etc/ssl/private/www.afrosuperstore.ca.key
    SSLCertificateChainFile /etc/ssl/certs/www.afrosuperstore.ca.ca-bundle
    
    # SSL Security settings
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
    SSLCompression off
    
    # Security headers
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # Enable required modules
    LoadModule proxy_module modules/mod_proxy.so
    LoadModule proxy_http_module modules/mod_proxy_http.so
    LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
    LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so
    LoadModule rewrite_module modules/mod_rewrite.so
    LoadModule headers_module modules/mod_headers.so
    
    # Frontend (Next.js static files)
    <Directory "/home/afrosuperstore/afrosuperstore.ca/frontend/.next">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Serve static files directly
        <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$">
            ExpiresActive On
            ExpiresDefault "access plus 1 year"
            Header append Cache-Control "public, immutable"
        </FilesMatch>
    </Directory>
    
    # API Proxy to Node.js backend (port 3001)
    ProxyPreserveHost On
    ProxyRequests Off
    
    <Proxy *>
        Order deny,allow
        Allow from all
    </Proxy>
    
    # API routes
    ProxyPass /api http://localhost:3001/api
    ProxyPassReverse /api http://localhost:3001/api
    
    # Backend admin routes
    ProxyPass /admin http://localhost:3002/admin
    ProxyPassReverse /admin http://localhost:3002/admin
    
    # Auth routes
    ProxyPass /auth http://localhost:3002/auth
    ProxyPassReverse /auth http://localhost:3002/auth
    
    # WebSocket support for Next.js
    ProxyPass /_next/static/ws http://localhost:3000/_next/static/ws
    ProxyPassReverse /_next/static/ws http://localhost:3000/_next/static/ws
    
    # Rate limiting for API
    <Location "/api">
        # Add rate limiting headers if mod_security is available
        SetEnvIfNoCase Request_URI "^/api" API_REQUEST
    </Location>
    
    # Health check endpoint
    <Location "/health">
        ProxyPass http://localhost:3001/health
        ProxyPassReverse http://localhost:3001/health
    </Location>
    
    # Handle Next.js client-side routing
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ /index.html [L]
    
    # Error and access logs
    ErrorLog /home/afrosuperstore/afrosuperstore.ca/logs/apache_ssl_error.log
    CustomLog /home/afrosuperstore/afrosuperstore.ca/logs/apache_ssl_access.log combined
    
    # Custom error pages
    ErrorDocument 404 /404.html
    ErrorDocument 500 /500.html
    ErrorDocument 502 /502.html
    ErrorDocument 503 /503.html
</VirtualHost>

# Additional security configurations
<IfModule mod_security.c>
    SecRuleEngine On
    SecRequestBodyAccess On
    SecResponseBodyAccess On
    SecResponseBodyMimeType text/plain text/html text/xml application/json
</IfModule>

# Gzip compression
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/plain
    AddOutputFilterByType DEFLATE text/html
    AddOutputFilterByType DEFLATE text/xml
    AddOutputFilterByType DEFLATE text/css
    AddOutputFilterByType DEFLATE application/xml
    AddOutputFilterByType DEFLATE application/xhtml+xml
    AddOutputFilterByType DEFLATE application/rss+xml
    AddOutputFilterByType DEFLATE application/javascript
    AddOutputFilterByType DEFLATE application/x-javascript
    AddOutputFilterByType DEFLATE application/json
</IfModule>

<!DOCTYPE html>
<html>
<head>
    <title>Admin API Test</title>
</head>
<body>
    <h1>Admin API Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testDashboard()">Test Dashboard</button>
    <div id="results"></div>

    <script>
        const API_URL = 'http://localhost:3001';
        let authToken = null;

        async function testLogin() {
            try {
                const response = await fetch(`${API_URL}/api/admin/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: 'admin@example.com', 
                        password: 'password' 
                    }),
                });

                const data = await response.json();
                document.getElementById('results').innerHTML = `
                    <h3>Login Test Results:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;

                if (data.success && data.token) {
                    authToken = data.token;
                }
            } catch (error) {
                document.getElementById('results').innerHTML = `
                    <h3>Login Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }

        async function testDashboard() {
            if (!authToken) {
                document.getElementById('results').innerHTML = '<p>Please login first</p>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const data = await response.json();
                document.getElementById('results').innerHTML = `
                    <h3>Dashboard Test Results:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('results').innerHTML = `
                    <h3>Dashboard Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>

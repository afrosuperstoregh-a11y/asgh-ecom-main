services:
  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    networks:
      - ecommerce-network

  # API Server
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ecommerce-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

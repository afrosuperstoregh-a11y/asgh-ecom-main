groups:
  - name: marketing.rules
    rules:
      # Campaign Performance Alerts
      - alert: CampaignLowOpenRate
        expr: marketing_campaign_open_rate < 0.15
        for: 2h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Campaign {{ $labels.campaign_id }} has low open rate"
          description: "Campaign {{ $labels.campaign_id }} open rate is {{ $value | humanizePercentage }} which is below 15% threshold"

      - alert: CampaignLowClickRate
        expr: marketing_campaign_click_rate < 0.02
        for: 2h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Campaign {{ $labels.campaign_id }} has low click rate"
          description: "Campaign {{ $labels.campaign_id }} click rate is {{ $value | humanizePercentage }} which is below 2% threshold"

      - alert: CampaignHighBounceRate
        expr: marketing_campaign_bounce_rate > 0.05
        for: 1h
        labels:
          severity: critical
          team: marketing
        annotations:
          summary: "Campaign {{ $labels.campaign_id }} has high bounce rate"
          description: "Campaign {{ $labels.campaign_id }} bounce rate is {{ $value | humanizePercentage }} which exceeds 5% threshold"

      # Email Service Alerts
      - alert: SendGridAPIError
        expr: rate(sendgrid_api_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: marketing
        annotations:
          summary: "SendGrid API error rate is high"
          description: "SendGrid API error rate is {{ $value }} errors per second"

      - alert: SendGridDeliveryFailure
        expr: rate(sendgrid_delivery_failures_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "SendGrid delivery failure rate is high"
          description: "SendGrid delivery failure rate is {{ $value | humanizePercentage }}"

      # SMS Service Alerts
      - alert: TwilioAPIError
        expr: rate(twilio_api_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: marketing
        annotations:
          summary: "Twilio API error rate is high"
          description: "Twilio API error rate is {{ $value }} errors per second"

      - alert: TwilioDeliveryFailure
        expr: rate(twilio_delivery_failures_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Twilio delivery failure rate is high"
          description: "Twilio delivery failure rate is {{ $value | humanizePercentage }}"

      # Queue Processing Alerts
      - alert: MarketingQueueBacklog
        expr: marketing_queue_size > 1000
        for: 10m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Marketing queue has large backlog"
          description: "Marketing queue size is {{ $value }} items"

      - alert: MarketingQueueStalled
        expr: increase(marketing_jobs_processed_total[10m]) == 0
        for: 5m
        labels:
          severity: critical
          team: marketing
        annotations:
          summary: "Marketing queue processing is stalled"
          description: "No marketing jobs have been processed in the last 10 minutes"

      - alert: MarketingJobFailureRate
        expr: rate(marketing_jobs_failed_total[5m]) / rate(marketing_jobs_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Marketing job failure rate is high"
          description: "Marketing job failure rate is {{ $value | humanizePercentage }}"

      # Abandoned Cart Alerts
      - alert: HighAbandonedCartRate
        expr: marketing_abandoned_cart_rate > 0.7
        for: 1h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "High abandoned cart rate"
          description: "Abandoned cart rate is {{ $value | humanizePercentage }} which is above 70%"

      - alert: LowCartRecoveryRate
        expr: marketing_cart_recovery_rate < 0.1
        for: 24h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Low cart recovery rate"
          description: "Cart recovery rate is {{ $value | humanizePercentage }} which is below 10%"

      # Subscription Alerts
      - alert: SubscriptionRateDrop
        expr: rate(marketing_subscriptions_total[1h]) < 0.5
        for: 2h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Subscription rate has dropped"
          description: "New subscription rate is {{ $value }} per hour"

      - alert: UnsubscriptionRateSpike
        expr: rate(marketing_unsubscriptions_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: marketing
        annotations:
          summary: "Unsubscription rate has spiked"
          description: "Unsubscription rate is {{ $value }} per minute"

      # System Performance Alerts
      - alert: MarketingAPIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="marketing-api"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Marketing API latency is high"
          description: "95th percentile latency is {{ $value }}s"

      - alert: MarketingAPIErrorRate
        expr: rate(http_requests_total{job="marketing-api",status=~"5.."}[5m]) / rate(http_requests_total{job="marketing-api"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: marketing
        annotations:
          summary: "Marketing API error rate is high"
          description: "Error rate is {{ $value | humanizePercentage }}"

      # Database Performance Alerts
      - alert: MarketingDBSlowQueries
        expr: pg_stat_statements_mean_time_seconds{datname="ecommerce"} > 0.5
        for: 5m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Marketing database has slow queries"
          description: "Average query time is {{ $value }}s"

      - alert: MarketingDBConnectionsHigh
        expr: pg_stat_activity_count{datname="ecommerce"} > 80
        for: 5m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Marketing database connections are high"
          description: "Database has {{ $value }} active connections"

      # Redis Performance Alerts
      - alert: RedisMemoryUsageHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: critical
          team: marketing
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      - alert: RedisConnectionsHigh
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Redis connections are high"
          description: "Redis has {{ $value }} connected clients"

  - name: marketing.business.rules
    rules:
      # Business Metrics Alerts
      - alert: LowCampaignROI
        expr: marketing_campaign_roi < 1.0
        for: 24h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Campaign ROI is below break-even"
          description: "Campaign {{ $labels.campaign_id }} ROI is {{ $value }}"

      - alert: LowConversionRate
        expr: marketing_conversion_rate < 0.02
        for: 6h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Marketing conversion rate is low"
          description: "Overall conversion rate is {{ $value | humanizePercentage }}"

      - alert: HighCustomerAcquisitionCost
        expr: marketing_customer_acquisition_cost > 50
        for: 24h
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Customer acquisition cost is high"
          description: "CAC is ${{ $value }} which is above $50 threshold"

      - alert: EmailListGrowthStalled
        expr: increase(marketing_email_list_size[7d]) < 100
        for: 1d
        labels:
          severity: warning
          team: marketing
        annotations:
          summary: "Email list growth has stalled"
          description: "Email list grew by less than 100 subscribers in the last 7 days"

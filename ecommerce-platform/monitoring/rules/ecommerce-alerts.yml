groups:
  - name: ecommerce.rules
    rules:
      # API Performance Alerts
      - alert: APIHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API response time is high"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes"

      - alert: APIVeryHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 2m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API response time is very high"
          description: "95th percentile response time is {{ $value }}s for the last 2 minutes"

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API error rate is high"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      - alert: APIDown
        expr: up{job="api-servers"} == 0
        for: 1m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API server is down"
          description: "API server {{ $labels.instance }} has been down for more than 1 minute"

      # Database Performance Alerts
      - alert: PostgreSQLHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL connection count is high"
          description: "PostgreSQL has {{ $value }} active connections"

      - alert: PostgreSQLVeryHighConnections
        expr: pg_stat_activity_count > 90
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL connection count is very high"
          description: "PostgreSQL has {{ $value }} active connections"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Average query time is {{ $value }}s for the last 5 minutes"

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag_seconds > 10
        for: 3m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL replication lag is high"
          description: "Replication lag is {{ $value }} seconds"

      - alert: PostgreSQLDown
        expr: up{job=~"postgres-.*"} == 0
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL server is down"
          description: "PostgreSQL server {{ $labels.instance }} has been down for more than 1 minute"

      # Redis Performance Alerts
      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      - alert: RedisVeryHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 2m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis memory usage is very high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      - alert: RedisHighConnectionCount
        expr: redis_connected_clients > 80
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis connection count is high"
          description: "Redis has {{ $value }} connected clients"

      - alert: RedisDown
        expr: up{job=~"redis-.*"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis server is down"
          description: "Redis server {{ $labels.instance }} has been down for more than 1 minute"

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: VeryHighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 2m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Very high CPU usage"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: VeryHighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Very high memory usage"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "Low disk space"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}:{{ $labels.mountpoint }}"

      - alert: VeryLowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Very low disk space"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}:{{ $labels.mountpoint }}"

      # Application Specific Alerts
      - alert: HighCartAbandonmentRate
        expr: rate(cart_abandonment_total[5m]) / rate(cart_creation_total[5m]) > 0.7
        for: 10m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "High cart abandonment rate"
          description: "Cart abandonment rate is {{ $value | humanizePercentage }} for the last 10 minutes"

      - alert: LowConversionRate
        expr: rate(order_completed_total[1h]) / rate(cart_creation_total[1h]) < 0.1
        for: 15m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Low conversion rate"
          description: "Conversion rate is {{ $value | humanizePercentage }} for the last hour"

      - alert: HighPaymentFailureRate
        expr: rate(payment_failed_total[5m]) / rate(payment_attempted_total[5m]) > 0.15
        for: 5m
        labels:
          severity: critical
          service: business
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      # Job Queue Alerts
      - alert: JobQueueBacklog
        expr: redis_list_length{queue="jobs"} > 1000
        for: 5m
        labels:
          severity: warning
          service: jobs
        annotations:
          summary: "Job queue backlog is high"
          description: "Job queue has {{ $value }} pending jobs"

      - alert: JobProcessingStalled
        expr: rate(job_processed_total[5m]) == 0
        for: 2m
        labels:
          severity: critical
          service: jobs
        annotations:
          summary: "Job processing has stalled"
          description: "No jobs have been processed in the last 5 minutes"

      - alert: HighJobFailureRate
        expr: rate(job_failed_total[5m]) / rate(job_processed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: jobs
        annotations:
          summary: "High job failure rate"
          description: "Job failure rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      # Cache Performance Alerts
      - alert: LowCacheHitRate
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.8
        for: 10m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }} for the last 10 minutes"

      - alert: VeryLowCacheHitRate
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.6
        for: 5m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Very low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      # External Service Alerts
      - alert: ExternalServiceDown
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
          service: external
        annotations:
          summary: "External service is down"
          description: "External service {{ $labels.instance }} is down"

      - alert: ExternalServiceSlow
        expr: probe_duration_seconds > 5
        for: 5m
        labels:
          severity: warning
          service: external
        annotations:
          summary: "External service is slow"
          description: "External service {{ $labels.instance }} response time is {{ $value }}s"

      # SSL Certificate Alerts
      - alert: SSLCertificateExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: warning
          service: security
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"

      - alert: SSLCertificateExpired
        expr: probe_ssl_earliest_cert_expiry - time() < 0
        for: 1m
        labels:
          severity: critical
          service: security
        annotations:
          summary: "SSL certificate has expired"
          description: "SSL certificate for {{ $labels.instance }} has expired"

  - name: ecommerce.recording.rules
    rules:
      # API Performance Recording
      - record: api:request_rate:5m
        expr: rate(http_requests_total[5m])
        
      - record: api:error_rate:5m
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])
        
      - record: api:response_time:p95:5m
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))
        
      - record: api:response_time:p99:5m
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

      # Database Performance Recording
      - record: postgres:connections:current
        expr: pg_stat_activity_count
        
      - record: postgres:query_time:avg:5m
        expr: rate(pg_stat_statements_mean_time_seconds[5m])
        
      - record: postgres:replication_lag:seconds
        expr: pg_replication_lag_seconds

      # Redis Performance Recording
      - record: redis:memory_usage:percent
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100
        
      - record: redis:connections:current
        expr: redis_connected_clients
        
      - record: redis:hit_rate:5m
        expr: rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) * 100

      # Business Metrics Recording
      - record: business:conversion_rate:1h
        expr: rate(order_completed_total[1h]) / rate(cart_creation_total[1h]) * 100
        
      - record: business:cart_abandonment_rate:1h
        expr: rate(cart_abandonment_total[1h]) / rate(cart_creation_total[1h]) * 100
        
      - record: business:payment_failure_rate:5m
        expr: rate(payment_failed_total[5m]) / rate(payment_attempted_total[5m]) * 100

      # System Resource Recording
      - record: system:cpu_usage:percent:5m
        expr: (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100))
        
      - record: system:memory_usage:percent:5m
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
        
      - record: system:disk_usage:percent
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100

      # Cache Performance Recording
      - record: cache:hit_rate:5m
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) * 100
        
      - record: cache:operations_rate:5m
        expr: rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])

      # Job Queue Recording
      - record: jobs:processing_rate:5m
        expr: rate(job_processed_total[5m])
        
      - record: jobs:failure_rate:5m
        expr: rate(job_failed_total[5m]) / rate(job_processed_total[5m]) * 100
        
      - record: jobs:queue_length
        expr: redis_list_length{queue="jobs"}

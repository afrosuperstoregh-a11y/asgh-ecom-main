global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/marketing-alerts.yml"

scrape_configs:
  # Marketing API Metrics
  - job_name: 'marketing-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/metrics'
    scrape_interval: 5s
    params:
      format: ['prometheus']

  # Marketing Worker Metrics
  - job_name: 'marketing-worker'
    static_configs:
      - targets: ['marketing-worker:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Redis Queue Metrics
  - job_name: 'redis-queue'
    static_configs:
      - targets: ['redis-queue:6379']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Redis Cache Metrics
  - job_name: 'redis-cache'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL Metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # SendGrid Metrics (if available)
  - job_name: 'sendgrid'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/api/marketing/metrics/sendgrid'
    scrape_interval: 60s
    scrape_timeout: 10s

  # Twilio Metrics (if available)
  - job_name: 'twilio'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/api/marketing/metrics/twilio'
    scrape_interval: 60s
    scrape_timeout: 10s

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

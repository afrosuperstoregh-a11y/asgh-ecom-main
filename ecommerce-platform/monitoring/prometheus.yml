global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ecommerce-production'
    replica: 'prometheus-1'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: /metrics

  # Nginx Load Balancer
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-lb:8080']
    scrape_interval: 30s
    metrics_path: /nginx_status
    params:
      format: ['prometheus']

  # API Servers
  - job_name: 'api-servers'
    static_configs:
      - targets: 
        - 'api-1:3001'
        - 'api-2:3001'
    scrape_interval: 15s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-1'
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-2'

  # Client Application
  - job_name: 'client'
    static_configs:
      - targets: ['client:3000']
    scrape_interval: 30s
    metrics_path: /metrics

  # PostgreSQL Master
  - job_name: 'postgres-master'
    static_configs:
      - targets: ['postgres-master:5432']
    scrape_interval: 30s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
        replacement: 'postgres-master'

  # PostgreSQL Replicas
  - job_name: 'postgres-replicas'
    static_configs:
      - targets:
        - 'postgres-replica-1:5432'
        - 'postgres-replica-2:5432'
    scrape_interval: 30s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance

  # PgBouncer
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer:6432']
    scrape_interval: 15s
    metrics_path: /metrics

  # Redis Master
  - job_name: 'redis-master'
    static_configs:
      - targets: ['redis-master:6379']
    scrape_interval: 15s
    metrics_path: /metrics

  # Redis Slaves
  - job_name: 'redis-slaves'
    static_configs:
      - targets:
        - 'redis-slave-1:6379'
        - 'redis-slave-2:6379'
    scrape_interval: 15s
    metrics_path: /metrics

  # Redis Queue
  - job_name: 'redis-queue'
    static_configs:
      - targets: ['redis-queue:6379']
    scrape_interval: 15s
    metrics_path: /metrics

  # Job Processor
  - job_name: 'job-processor'
    static_configs:
      - targets: ['job-processor:3001']
    scrape_interval: 30s
    metrics_path: /metrics

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: 
        - 'node-exporter:9100'
    scrape_interval: 30s
    metrics_path: /metrics

  # cAdvisor (Container Metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
    metrics_path: /metrics

  # Blackbox Exporter (External Monitoring)
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://yourdomain.com
        - https://api.yourdomain.com/health
        - https://cdn.yourdomain.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox Exporter (TCP Monitoring)
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
        - postgres-master:5432
        - redis-master:6379
        - pgbouncer:6432
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Docker Engine Metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['docker-exporter:9323']
    scrape_interval: 30s

  # Custom Application Metrics
  - job_name: 'application-metrics'
    static_configs:
      - targets:
        - 'api-1:3001'
        - 'api-2:3001'
    scrape_interval: 15s
    metrics_path: /api/metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-1'
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-2'

# Remote write configuration (optional)
# remote_write:
#   - url: "https://your-remote-storage/api/v1/write"
#     basic_auth:
#       username: your-username
#       password: your-password
#     queue_config:
#       max_samples_per_send: 1000
#       max_shards: 200
#       capacity: 2500

# Storage configuration
storage:
  tsdb:
    path: /prometheus
    retention.time: 200h
    retention.size: 10GB

# Railway configuration for production deployment
# Optimized for e-commerce platform scaling and performance

[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Client service configuration
[[services]]
name = "client"
source = "client"
[services.build]
builder = "nixpacks"
[services.deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
[services.variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
PORT = "3000"
HOSTNAME = "0.0.0.0"

# API service configuration
[[services]]
name = "api"
source = "api"
[services.build]
builder = "nixpacks"
[services.deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
[services.variables]
NODE_ENV = "production"
PORT = "3001"
HOSTNAME = "0.0.0.0"

# Database configuration
[[services]]
name = "database"
[services.variables]
POSTGRES_USER = "ecommerce_user"
POSTGRES_PASSWORD = "${DATABASE_PASSWORD}"
POSTGRES_DB = "ecommerce_db"

# Redis configuration
[[services]]
name = "redis"
[services.variables]
REDIS_PASSWORD = "${REDIS_PASSWORD}"

# Environment variables for production
[variables]
# Application
NODE_ENV = "production"
NEXT_PUBLIC_APP_URL = "${PUBLIC_URL}"
API_URL = "${API_URL}"

# Database
DATABASE_URL = "postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:5432/${DATABASE_NAME}"
DIRECT_URL = "postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:5432/${DATABASE_NAME}"

# Redis
REDIS_URL = "redis://:${REDIS_PASSWORD}@${REDIS_HOST}:6379"

# JWT
JWT_SECRET = "${JWT_SECRET}"
JWT_EXPIRES_IN = "7d"

# Stripe
STRIPE_SECRET_KEY = "${STRIPE_SECRET_KEY}"
STRIPE_PUBLISHABLE_KEY = "${STRIPE_PUBLISHABLE_KEY}"
STRIPE_WEBHOOK_SECRET = "${STRIPE_WEBHOOK_SECRET}"
STRIPE_CONNECT_CLIENT_ID = "${STRIPE_CONNECT_CLIENT_ID}"
STRIPE_CONNECT_SECRET_KEY = "${STRIPE_CONNECT_SECRET_KEY}"

# SendGrid
SENDGRID_API_KEY = "${SENDGRID_API_KEY}"
FROM_EMAIL = "${FROM_EMAIL}"

# Twilio
TWILIO_ACCOUNT_SID = "${TWILIO_ACCOUNT_SID}"
TWILIO_AUTH_TOKEN = "${TWILIO_AUTH_TOKEN}"
TWILIO_PHONE_NUMBER = "${TWILIO_PHONE_NUMBER}"

# NextAuth
NEXTAUTH_URL = "${PUBLIC_URL}"
NEXTAUTH_SECRET = "${NEXTAUTH_SECRET}"

# File Upload
UPLOAD_DIR = "/app/uploads"
MAX_FILE_SIZE = "10485760"

# Monitoring
SENTRY_DSN = "${SENTRY_DSN}"
LOGROCKET_APP_ID = "${LOGROCKET_APP_ID}"

# Search
ELASTICSEARCH_URL = "${ELASTICSEARCH_URL}"
ELASTICSEARCH_USERNAME = "${ELASTICSEARCH_USERNAME}"
ELASTICSEARCH_PASSWORD = "${ELASTICSEARCH_PASSWORD}"

# Performance
ENABLE_CACHING = "true"
CACHE_TTL = "3600"
RATE_LIMIT_WINDOW = "900000"
RATE_LIMIT_MAX = "100"

# Security
CORS_ORIGIN = "${PUBLIC_URL}"
SESSION_SECRET = "${SESSION_SECRET}"
ENCRYPTION_KEY = "${ENCRYPTION_KEY}"

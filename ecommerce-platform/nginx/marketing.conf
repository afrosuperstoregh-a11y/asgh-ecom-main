events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server api:3001;
    }

    upstream client_backend {
        server client:3000;
    }

    # Rate limiting for marketing endpoints
    limit_req_zone $binary_remote_addr zone=marketing:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=subscribe:10m rate=1r/s;

    server {
        listen 80;
        server_name localhost;

        # Client routes
        location / {
            proxy_pass http://client_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes
        location /api/ {
            limit_req zone=marketing burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Marketing endpoints with stricter rate limiting
        location /api/marketing/subscribe {
            limit_req zone=subscribe burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

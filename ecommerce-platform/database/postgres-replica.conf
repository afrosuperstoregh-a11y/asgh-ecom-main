# PostgreSQL Replica Configuration for Production
# Optimized for read operations and replication

# CONNECTION SETTINGS
listen_addresses = '*'
port = 5432
max_connections = 200
hot_standby = on

# MEMORY SETTINGS
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 64MB
dynamic_shared_memory_type = posix

# REPLICATION SETTINGS
primary_conninfo = 'host=postgres-master port=5432 user=replicator password=${POSTGRES_REPLICATION_PASSWORD}'
recovery_target_timeline = 'latest'
standby_mode = on

# WAL SETTINGS
wal_level = replica
max_wal_senders = 0
max_replication_slots = 0

# CHECKPOINT SETTINGS
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# LOGGING
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-replica-%Y-%m-%d_%H%M%S.log'
log_statement = 'all'
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# PERFORMANCE
random_page_cost = 1.1
effective_io_concurrency = 200

# AUTOVACUUM
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# SECURITY
ssl = on
ssl_cert_file = '/etc/ssl/certs/server.crt'
ssl_key_file = '/etc/ssl/private/server.key'

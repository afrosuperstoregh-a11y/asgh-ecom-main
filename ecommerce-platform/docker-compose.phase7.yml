# Phase 7: Advanced Commerce Features - Docker Compose Configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose.phase7.yml up

version: '3.8'

services:
  # ============================================
  # PHASE 7: SUBSCRIPTION BILLING SERVICE
  # ============================================
  
  subscription-billing:
    build:
      context: ./services/subscription-billing
      dockerfile: Dockerfile
    container_name: subscription-billing
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3005
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_SUBSCRIPTION_WEBHOOK_SECRET}
      - SUBSCRIPTION_TRIAL_DAYS=${SUBSCRIPTION_TRIAL_DAYS:-14}
      - SUBSCRIPTION_DUNNING_RETRIES=${SUBSCRIPTION_DUNNING_RETRIES:-3}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
      - ./services/subscription-billing:/app
      - /app/node_modules
    ports:
      - "3005:3005"
    depends_on:
      - postgres
      - redis
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PHASE 7: LOYALTY PROGRAM SERVICE
  # ============================================
  
  loyalty-service:
    build:
      context: ./services/loyalty
      dockerfile: Dockerfile
    container_name: loyalty-service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3006
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - LOYALTY_POINTS_PER_DOLLAR=${LOYALTY_POINTS_PER_DOLLAR:-1.00}
      - LOYALTY_POINTS_EXPIRATION_DAYS=${LOYALTY_POINTS_EXPIRATION_DAYS:-365}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
      - ./services/loyalty:/app
      - /app/node_modules
    ports:
      - "3006:3006"
    depends_on:
      - postgres
      - redis
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PHASE 7: AFFILIATE PROGRAM SERVICE
  # ============================================
  
  affiliate-service:
    build:
      context: ./services/affiliate
      dockerfile: Dockerfile
    container_name: affiliate-service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3007
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_CONNECT_CLIENT_ID=${STRIPE_CONNECT_CLIENT_ID}
      - AFFILIATE_COMMISSION_RATE=${AFFILIATE_COMMISSION_RATE:-10.00}
      - AFFILIATE_COOKIE_DURATION=${AFFILIATE_COOKIE_DURATION:-30}
      - AFFILIATE_PAYOUT_THRESHOLD=${AFFILIATE_PAYOUT_THRESHOLD:-50.00}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - AFFILIATE_JWT_SECRET=${AFFILIATE_JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
      - ./services/affiliate:/app
      - /app/node_modules
    ports:
      - "3007:3007"
    depends_on:
      - postgres
      - redis
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PHASE 7: BACKGROUND JOB PROCESSOR
  # ============================================
  
  phase7-jobs:
    build:
      context: ./services/phase7-jobs
      dockerfile: Dockerfile
    container_name: phase7-jobs
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
      - ./services/phase7-jobs:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - ecommerce-network
    deploy:
      replicas: 2

  # ============================================
  # PHASE 7: ANALYTICS SERVICE
  # ============================================
  
  phase7-analytics:
    build:
      context: ./services/phase7-analytics
      dockerfile: Dockerfile
    container_name: phase7-analytics
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3008
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PROMETHEUS_GATEWAY_URL=${PROMETHEUS_GATEWAY_URL:-http://prometheus:9091}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
      - ./services/phase7-analytics:/app
      - /app/node_modules
    ports:
      - "3008:3008"
    depends_on:
      - postgres
      - redis
      - prometheus
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # ENHANCED REDIS CONFIGURATION
  # ============================================
  
  redis-phase7:
    image: redis:7-alpine
    container_name: redis-phase7
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-phase7-data:/data
      - ./config/redis-phase7.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6380:6379"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # PHASE 7: NGINX UPDATES
  # ============================================
  
  nginx:
    volumes:
      - ./config/nginx/phase7-upstreams.conf:/etc/nginx/conf.d/phase7-upstreams.conf:ro
      - ./config/nginx/phase7-ratelimit.conf:/etc/nginx/conf.d/phase7-ratelimit.conf:ro
    depends_on:
      - subscription-billing
      - loyalty-service
      - affiliate-service
      - phase7-analytics

  # ============================================
  # PROMETHEUS CONFIGURATION UPDATES
  # ============================================
  
  prometheus:
    volumes:
      - ./monitoring/prometheus-phase7.yml:/etc/prometheus/prometheus-phase7.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--config.file=/etc/prometheus/prometheus-phase7.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # ============================================
  # GRAFANA DASHBOARDS
  # ============================================
  
  grafana:
    volumes:
      - ./monitoring/grafana/dashboards/phase7:/etc/grafana/provisioning/dashboards/phase7:ro
      - ./monitoring/grafana/datasources/phase7:/etc/grafana/provisioning/datasources/phase7:ro

# ============================================
# VOLUMES
# ============================================

volumes:
  redis-phase7-data:
    driver: local

# ============================================
# NETWORKS
# ============================================

networks:
  ecommerce-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

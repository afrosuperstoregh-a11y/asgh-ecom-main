version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: asca_postgres_admin
    environment:
      POSTGRES_DB: asca_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - asca_network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: asca_redis_admin
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asca_network

  # Backend API with Admin Features
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: asca_api_admin
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/asca_ecommerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      STRIPE_SECRET_KEY: sk_test_your_stripe_secret_key
      SENDGRID_API_KEY: your_sendgrid_api_key
      TWILIO_ACCOUNT_SID: your_twilio_account_sid
      TWILIO_AUTH_TOKEN: your_twilio_auth_token
      UPLOAD_DIR: /app/uploads
    ports:
      - "3001:3001"
    volumes:
      - ./api:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - asca_network
    command: npm run dev

  # Frontend with Admin Panel
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: asca_client_admin
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_your_stripe_publishable_key
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - asca_network
    command: npm run dev

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: asca_nginx_admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - client
    networks:
      - asca_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  asca_network:
    driver: bridge

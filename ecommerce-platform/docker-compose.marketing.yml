version: '3.8'

services:
  # Main API Service
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ecommerce
      - REDIS_URL=redis://redis:6379
      - REDIS_QUEUE_URL=redis://redis-queue:6379
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - CMS_API_URL=${CMS_API_URL}
      - CMS_API_KEY=${CMS_API_KEY}
    depends_on:
      - postgres
      - redis
      - redis-queue
    networks:
      - marketing-network

  # Marketing Worker Service
  marketing-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: node src/workers/marketingWorker.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ecommerce
      - REDIS_URL=redis://redis:6379
      - REDIS_QUEUE_URL=redis://redis-queue:6379
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - CMS_API_URL=${CMS_API_URL}
      - CMS_API_KEY=${CMS_API_KEY}
      - MARKETING_WORKER_CONCURRENCY=5
    depends_on:
      - postgres
      - redis
      - redis-queue
    networks:
      - marketing-network
    restart: unless-stopped

  # Client Service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001
      - NEXT_PUBLIC_MARKETING_API_URL=http://api:3001/api/marketing
    depends_on:
      - api
    networks:
      - marketing-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=ecommerce
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - marketing-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketing-network

  # Redis Queue for Marketing Jobs
  redis-queue:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_queue_data:/data
    networks:
      - marketing-network

  # Redis Commander (Redis Management UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379,queue:redis-queue:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - redis-queue
    networks:
      - marketing-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/marketing.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
      - client
    networks:
      - marketing-network

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - marketing-network

  # Grafana (Dashboard)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - marketing-network

volumes:
  postgres_data:
  redis_data:
  redis_queue_data:
  prometheus_data:
  grafana_data:

networks:
  marketing-network:
    driver: bridge

apiVersion: v2
name: asca-ecom
description: A Helm chart for ASCA E-commerce Platform
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - ecommerce
  - nextjs
  - nestjs
  - nodejs
  - react
home: https://github.com/burnatec/asca_ecom
sources:
  - https://github.com/burnatec/asca_ecom
maintainers:
  - name: burnatec
    email: your-email@example.com
dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

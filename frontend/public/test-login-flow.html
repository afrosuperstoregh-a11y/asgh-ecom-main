<!DOCTYPE html>
<html>
<head>
    <title>Admin Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; }
        iframe { width: 100%; height: 500px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Admin Login Flow Test</h1>
    
    <div class="test-section">
        <h2>1. Test Login Page</h2>
        <iframe src="/admin/login"></iframe>
    </div>

    <div class="test-section">
        <h2>2. Manual Token Creation & Test</h2>
        <button onclick="createToken()">Create Token</button>
        <button onclick="testToken()">Test Token</button>
        <button onclick="clearToken()">Clear Token</button>
        <div id="results"></div>
    </div>

    <div class="test-section">
        <h2>3. Direct Dashboard Test</h2>
        <button onclick="testDashboard()">Test Dashboard API</button>
        <div id="dashboard-results"></div>
    </div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            results.appendChild(div);
        }

        function logDashboard(message, type = 'info') {
            const results = document.getElementById('dashboard-results');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            results.appendChild(div);
        }

        function createToken() {
            const timestamp = Date.now();
            const token = `prod-jwt-token-admin-${timestamp}`;
            
            localStorage.setItem('adminToken', token);
            localStorage.setItem('adminUser', JSON.stringify({
                id: 'admin-001',
                email: 'admin@afrosuperstore.ca',
                name: 'Super Admin',
                role: 'super_admin',
                permissions: ['read', 'write', 'delete', 'admin', 'super_admin']
            }));
            
            log(`Token created and stored: ${token}`, 'success');
            log('User data stored in localStorage');
        }

        function testToken() {
            const token = localStorage.getItem('adminToken');
            if (token) {
                log(`Testing token: ${token}`);
                
                // Test token validation logic
                const tokenParts = token.split('-');
                log(`Token parts: ${tokenParts.join(', ')}`);
                
                if (tokenParts[4]) {
                    const timestamp = parseInt(tokenParts[4]);
                    const currentTime = Date.now();
                    const age = currentTime - timestamp;
                    log(`Timestamp: ${timestamp}, Current: ${currentTime}, Age: ${age}ms`);
                    
                    if (age < 30 * 24 * 60 * 1000) {
                        log('Token should be valid (not expired)', 'success');
                    } else {
                        log('Token would be expired', 'error');
                    }
                }
            } else {
                log('No token found in localStorage', 'error');
            }
        }

        function clearToken() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            log('Token cleared from localStorage', 'success');
        }

        async function testDashboard() {
            logDashboard('Testing dashboard API access...');
            
            const token = localStorage.getItem('adminToken');
            if (!token) {
                logDashboard('No token found - please create token first', 'error');
                return;
            }

            try {
                logDashboard(`Using token: ${token}`);
                
                const response = await fetch('/api/admin/dashboard', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                logDashboard(`Response status: ${response.status}`);

                if (response.ok) {
                    const data = await response.json();
                    logDashboard('Dashboard access successful!', 'success');
                    logDashboard(`Response: ${JSON.stringify(data, null, 2)}`);
                } else {
                    const errorText = await response.text();
                    logDashboard(`Dashboard access failed: ${response.status} - ${errorText}`, 'error');
                }
            } catch (error) {
                logDashboard(`Dashboard error: ${error.message}`, 'error');
            }
        }

        // Auto-create token on page load
        window.addEventListener('load', function() {
            log('Page loaded - you can test the login flow');
            log('1. Use the iframe above to test the login page');
            log('2. Or create a manual token below for API testing');
        });
    </script>
</body>
</html>
